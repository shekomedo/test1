name: Build & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  REGISTRY_REGION: us-central1
  SERVICE_NAME: dataforge-ai

jobs:
  # ─── Job 1: Lint & Type Check ─────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run lint

  # ─── Job 2: Build Application ─────────────────────────────────────────────
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite frontend + esbuild server)
        run: npm run build
        env:
          DISABLE_HMR: "true"

      - name: Verify build output exists
        run: |
          echo "── Build artifacts ──"
          ls -lh dist/
          echo ""
          if [ ! -f dist/server.cjs ]; then
            echo "ERROR: dist/server.cjs not found!"
            exit 1
          fi
          if [ ! -d dist/client ] && [ ! -f dist/index.html ]; then
            echo "WARNING: No frontend build output detected"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # ─── Job 3: Deploy to Cloud Run (only on main/master push) ───────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud Run
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build Docker image
        run: |
          cat > Dockerfile << 'DOCKERFILE'
          FROM node:22-slim
          WORKDIR /app
          COPY dist/ ./dist/
          COPY package.json package-lock.json ./
          RUN npm ci --omit=dev
          ENV NODE_ENV=production
          ENV PORT=8080
          EXPOSE 8080
          CMD ["node", "dist/server.cjs"]
          DOCKERFILE

          gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGISTRY_REGION }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGISTRY_REGION }} \
            --platform managed \
            --port 8080 \
            --allow-unauthenticated \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --no-cpu-throttling